<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Đăng kí Form</h1>
    <form>
        <table>
            <tr>
                <td><label for="hoten">Họ tên:</label></td>
                <td><input type="text" id="hoten" placeholder="Họ tên"></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" placeholder="Email"></td>
            </tr>
            <tr>
                <td><label for="datetime">Thời gian:</label></td>
                <td><input type="datetime" id="datetime" placeholder="Thời gian"></td>
            </tr>
            <tr>
                <td><label for="gioitinh">Giới Tính:</label></td>
                <td>
                    <input type="radio" name="gt" value="nam">Nam
                    <input type="radio" name="gt" value="nu">Nữ
                </td>
            </tr>
            <tr>
                <td><label for="sothich">Sở thích:</label></td>
                <td>
                    <input type="checkbox" name="st">Thể thao
                    <input type="checkbox" name="st">Âm nhạc
                    <input type="checkbox" name="st">Du lịch
                </td>
            </tr>
            <tr>
                <td><input type="submit" value="Xác nhận"></td>
            </tr>
        </table>
    </form>
</body>
</html>
